<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pedido | Sky Juice</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 font-sans">
    <div class="max-w-xl mx-auto bg-white shadow-2xl rounded-[2rem] p-8 border-t-8 border-emerald-500 mt-6">
        <h2 class="text-2xl font-black text-center mb-6 uppercase tracking-tight text-gray-800">Confirmar Pedido</h2>
        
        <form id="pagoForm" class="space-y-5">
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Tu Nombre</label>
                <input type="text" id="nombre" required placeholder="Ej. Juan Pérez" class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-emerald-500 bg-gray-50">
            </div>
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Tu WhatsApp</label>
                <input type="tel" id="whatsapp" required pattern="[0-9]{10}" placeholder="6441234567" class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-emerald-500 bg-gray-50">
            </div>

            <div class="bg-emerald-50 p-5 rounded-2xl border border-emerald-100">
                <p class="text-[10px] font-black text-emerald-800 uppercase mb-1 tracking-widest">Punto de Entrega:</p>
                <p class="text-sm font-bold text-gray-700">📍 Calle Ejemplo #123, Col. Centro, Cd. Obregón</p>
            </div>
            
            <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                <p class="font-black text-blue-900 mb-3 uppercase text-xs tracking-widest">Paso 1: Pago por Transferencia</p>
                <div class="text-sm space-y-1 text-blue-800">
                    <p><strong>Banco:</strong> BBVA</p>
                    <p><strong>CLABE:</strong> 0000 0000 0000 0000 00</p>
                    <p><strong>Titular:</strong> Sky Juice Obregón</p>
                </div>
            </div>

            <button type="submit" class="w-full bg-emerald-500 text-white font-black py-5 rounded-2xl shadow-lg shadow-emerald-100 uppercase tracking-widest hover:bg-emerald-600 transition-all">
                Confirmar y enviar comprobante
            </button>
            <p class="text-[10px] text-center text-gray-400 font-bold uppercase mt-4">Al dar clic se abrirá tu WhatsApp para enviar el comprobante</p>
        </form>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const cant = params.get('cant') || 1;

        document.getElementById('pagoForm').onsubmit = async function(e) {
            e.preventDefault();
            const nom = document.getElementById('nombre').value;
            const tel = document.getElementById('whatsapp').value;
            
            // Texto automático para que el Excel no quede vacío
            const dir = "RECOLECCIÓN EN PUNTO";

            // URL DE TU FORMULARIO (La misma de tu link)
            const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSdzQWFhjdLQKUN-xgKMqbB39rqTDx-KJoAsAECS3MSdsFsTrQ/formResponse";
            
            const data = new URLSearchParams();
            // USANDO TUS IDs REALES:
            data.append("entry.796663698", nom);   // ID Nombre
            data.append("entry.504990176", tel);   // ID WhatsApp
            data.append("entry.1399542669", dir);  // ID Dirección (Auto)
            data.append("entry.1018610744", cant); // ID Cantidad (Probable)

            // 1. Enviar al Excel silenciosamente
            fetch(formURL, { method: "POST", mode: "no-cors", body: data });

            // 2. Enviar a tu WhatsApp
            const miTel = "526441880995"; 
            const msg = `¡HOLA SKY JUICE!%0A👤 *Nombre:* ${nom}%0A📱 *WhatsApp:* ${tel}%0A📦 *Pedido:* ${cant} botellas.%0A📍 *Entrega:* Pasaré al punto fijo.%0A---%0AYA REALICÉ MI PAGO. AQUÍ ESTÁ MI COMPROBANTE:`;
            
            setTimeout(() => {
                window.location.href = `https://wa.me/${miTel}?text=${msg}`;
            }, 500);
        };
    </script>
</body>
</html>
