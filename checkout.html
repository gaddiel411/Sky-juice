<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pedido | Sky Juice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 p-4 sm:p-8 text-slate-900">

    <div class="max-w-xl mx-auto bg-white shadow-2xl rounded-[3rem] p-8 sm:p-12 border-t-[12px] border-emerald-500 mt-4 text-center">
        
        <h1 class="text-4xl font-[900] mb-2 tracking-tighter uppercase italic text-slate-800">CONFIRMAR <span class="text-emerald-500">PEDIDO</span></h1>
        <p class="text-xs font-black uppercase tracking-[0.4em] text-slate-400 mb-10 text-center">Sky Juice Obregón</p>
        
        <form id="pagoForm" class="space-y-8 text-left">
            
            <div class="bg-slate-50 p-8 rounded-[2rem] border-2 border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Tu Pedido:</span>
                    <span id="display-cant" class="font-[900] text-emerald-600 text-3xl italic">--</span>
                </div>
                <div class="flex justify-between items-center border-t-2 border-dashed border-slate-200 pt-4">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Total a Pagar:</span>
                    <span id="display-total" class="font-[900] text-slate-900 text-3xl">$0</span>
                </div>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-4 mb-2 block">Nombre Completo</label>
                    <input type="text" id="nombre" required placeholder="Ej. Juan Pérez" 
                           class="w-full p-5 text-xl border-2 border-slate-100 rounded-3xl outline-none focus:border-emerald-500 bg-slate-50 font-bold placeholder:text-slate-300 transition-all">
                </div>
                
                <div>
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-4 mb-2 block">Tu WhatsApp</label>
                    <div class="flex gap-3">
                        <select id="codigo-pais" class="bg-slate-50 border-2 border-slate-100 rounded-3xl px-4 text-xl font-bold outline-none focus:border-emerald-500 appearance-none cursor-pointer">
                            <option value="52">🇲🇽 +52</option>
                        </select>
                        <input type="tel" id="whatsapp" required placeholder="6441234567" 
                               class="flex-1 p-5 text-xl border-2 border-slate-100 rounded-3xl outline-none focus:border-emerald-500 bg-slate-50 font-bold placeholder:text-slate-300 transition-all">
                    </div>
                </div>
            </div>

            <button type="submit" id="btn-finalizar" 
                    class="w-full bg-emerald-500 text-white font-[900] py-6 rounded-[2rem] shadow-2xl shadow-emerald-200 uppercase tracking-widest text-lg hover:bg-emerald-600 transition-all active:scale-95 disabled:bg-slate-200">
                CONFIRMAR PEDIDO
            </button>

            <p id="error-msg" class="text-red-600 text-xs font-black uppercase mt-4 text-center hidden"></p>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCqb6MTA5HwLbMtpqyyn50oZQduJKvRIu4",
            authDomain: "skyjuice-25d01.firebaseapp.com",
            databaseURL: "https://skyjuice-25d01-default-rtdb.firebaseio.com",
            projectId: "skyjuice-25d01"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // IMPORTANTE: Esta dirección debe ser IGUAL a la del admin
        const stockRef = db.ref('stock_actual');

        const params = new URLSearchParams(window.location.search);
        const cant = parseInt(params.get('cantidad')) || 1;
        const precio = 40;

        document.getElementById('display-cant').innerText = `${cant} ${cant === 1 ? 'jugo' : 'jugos'}`;
        document.getElementById('display-total').innerText = `$${cant * precio}`;

        document.getElementById('pagoForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-finalizar');
            const nom = document.getElementById('nombre').value;
            const tel = `+${document.getElementById('codigo-pais').value} ${document.getElementById('whatsapp').value}`;

            btn.disabled = true;
            btn.innerText = "VERIFICANDO...";

            stockRef.transaction((currentStock) => {
                // Si la base de datos está vacía (null), le ponemos 0 por defecto para evitar el error
                let stockSeguro = currentStock === null ? 0 : currentStock;
                
                if (stockSeguro >= cant) {
                    return stockSeguro - cant;
                } else {
                    return; // Cancela si no hay suficiente
                }
            }, (error, committed, snapshot) => {
                if (committed) {
                    // 1. Guardar pedido en Firebase para el Admin en tiempo real
                    db.ref('pedidos').push({
                        nombre: nom,
                        whatsapp: tel,
                        cantidad: cant,
                        fecha: new Date().toLocaleString(),
                        entrega: "PUNTO FIJO"
                    });

                    // 2. Registro en Google Sheets
                    const data = new URLSearchParams();
                    data.append("entry.796663698", nom);
                    data.append("entry.504990176", tel);
                    data.append("entry.1018610744", cant);
                    fetch("https://docs.google.com/forms/d/e/1FAIpQLSdzQWFhjdLQKUN-xgKMqbB39rqTDx-KJoAsAECS3MSdsFsTrQ/formResponse", { method: "POST", mode: "no-cors", body: data });

                    // 3. WhatsApp
                    window.location.href = `https://wa.me/526441880995?text=¡HOLA SKY JUICE!%0A👤 *Nombre:* ${nom}%0A📦 *Pedido:* ${cant} jugos.`;
                } else {
                    btn.disabled = false;
                    btn.innerText = "CONFIRMAR PEDIDO";
                    const disponible = snapshot.val() === null ? 0 : snapshot.val();
                    alert("¡Lo sentimos! Solo quedan " + disponible + " jugos.");
                }
            });
        };
    </script>
</body>
</html>
