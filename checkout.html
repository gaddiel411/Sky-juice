<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finalizar Pedido | Sky Juice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        /* Evita que el zoom automático en iPhone rompa el diseño */
        input, select { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-100 p-4 text-slate-900">

    <div class="max-w-md mx-auto bg-white shadow-2xl rounded-[2.5rem] p-6 border-t-[10px] border-emerald-500 mt-2 text-center">
        
        <h1 class="text-3xl font-[900] mb-1 tracking-tighter uppercase italic text-slate-800">CONFIRMAR <span class="text-emerald-500">PEDIDO</span></h1>
        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400 mb-6 text-center">Sky Juice Obregón</p>
        
        <form id="pagoForm" class="space-y-6 text-left">
            
            <div class="bg-slate-50 p-6 rounded-[2rem] border-2 border-slate-100">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic text-left">Pedido:</span>
                    <span id="display-cant" class="font-[900] text-emerald-600 text-2xl italic">--</span>
                </div>
                <div class="flex justify-between items-center border-t-2 border-dashed border-slate-200 pt-2">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic text-left">Total:</span>
                    <span id="display-total" class="font-[900] text-slate-900 text-2xl">$0</span>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2 mb-1 block italic">Nombre Completo</label>
                    <input type="text" id="nombre" required placeholder="TU NOMBRE" 
                           class="w-full h-14 p-4 text-lg border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 bg-slate-50 font-black uppercase italic">
                </div>
                
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2 mb-1 block italic">Tu WhatsApp</label>
                    <div class="flex gap-2 w-full">
                        <div class="relative w-24 flex-shrink-0">
                            <select id="codigo-pais" class="w-full h-14 bg-slate-50 border-2 border-slate-100 rounded-2xl px-2 text-sm font-bold outline-none appearance-none text-center">
                                <option value="52">🇲🇽 +52</option>
                            </select>
                        </div>
                        <input type="tel" id="whatsapp" required placeholder="6441234567" 
                               class="flex-1 h-14 p-4 text-lg border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 bg-slate-50 font-bold min-w-0">
                    </div>
                </div>
            </div>

            <button type="submit" id="btn-finalizar" 
                    class="w-full bg-emerald-500 text-white font-[900] py-5 rounded-2xl shadow-xl uppercase tracking-widest text-lg hover:bg-emerald-600 active:scale-95 transition-all">
                CONFIRMAR PEDIDO
            </button>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCqb6MTA5HwLbMtpqyyn50oZQduJKvRIu4",
            authDomain: "skyjuice-25d01.firebaseapp.com",
            databaseURL: "https://skyjuice-25d01-default-rtdb.firebaseio.com",
            projectId: "skyjuice-25d01"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const stockRef = db.ref('stock_actual');

        const params = new URLSearchParams(window.location.search);
        const cant = parseInt(params.get('cantidad')) || 1;

        document.getElementById('display-cant').innerText = `${cant} ${cant === 1 ? 'jugo' : 'jugos'}`;
        document.getElementById('display-total').innerText = `$${cant * 40}`;

        document.getElementById('pagoForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-finalizar');
            const nom = document.getElementById('nombre').value;
            const tel = `+${document.getElementById('codigo-pais').value} ${document.getElementById('whatsapp').value}`;
            
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            try {
                // Forzamos lectura fresca para evitar el error de null/0
                const snap = await stockRef.get();
                const stockDisponible = snap.val() || 0;

                if (stockDisponible < cant) {
                    alert("¡Lo sentimos! Solo quedan " + stockDisponible + " jugos.");
                    btn.disabled = false;
                    btn.innerText = "CONFIRMAR PEDIDO";
                    return;
                }

                // Descontamos stock
                await stockRef.set(stockDisponible - cant);

                // Registramos el pedido
                await db.ref('pedidos').push({
                    nombre: nom,
                    whatsapp: tel,
                    cantidad: cant,
                    fecha: new Date().toLocaleString()
                });

                // Google Sheets (Opcional - Quitar si no lo usas)
                const data = new URLSearchParams();
                data.append("entry.796663698", nom);
                data.append("entry.504990176", tel);
                data.append("entry.1018610744", cant);
                fetch("https://docs.google.com/forms/d/e/1FAIpQLSdzQWFhjdLQKUN-xgKMqbB39rqTDx-KJoAsAECS3MSdsFsTrQ/formResponse", { method: "POST", mode: "no-cors", body: data });

                // Al WhatsApp
                window.location.href = `https://wa.me/526441880995?text=¡HOLA! Soy ${nom}, pedí ${cant} jugos.`;

            } catch (error) {
                console.error(error);
                alert("Error de conexión. Intenta de nuevo.");
                btn.disabled = false;
                btn.innerText = "CONFIRMAR PEDIDO";
            }
        };
    </script>
</body>
</html>
