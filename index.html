<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Juice | Ciudad Obregón</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <header class="bg-white border-b-2 border-teal-600 shadow-sm sticky top-0 z-50">
        <nav class="max-w-4xl mx-auto p-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">SKY <span class="text-teal-600 font-light">JUICE</span></h1>
            <div class="text-right">
                <span class="block text-[10px] font-bold text-teal-700 uppercase tracking-widest">Entrega Local</span>
                <span class="text-sm font-bold text-gray-900">Cd. Obregón, Son.</span>
            </div>
        </nav>
        <div class="bg-teal-600 text-white text-center py-1 text-xs font-medium">📍 Entregas a domicilio únicamente en Ciudad Obregón</div>
    </header>

    <main class="max-w-4xl mx-auto p-6 mt-6">
        <div class="bg-white shadow-xl rounded-lg overflow-hidden grid md:grid-cols-2 gap-8 p-8 border border-gray-100">
            <div class="flex justify-center items-center bg-gray-50 rounded-lg p-4">
                <img src="producto.png" alt="Sky Juice" class="max-h-80 object-contain">
            </div>
            <div class="flex flex-col justify-center text-center md:text-left">
                <h2 class="text-3xl font-bold text-gray-900 mb-4 uppercase">Bebida Sky Juice</h2>
                <p class="text-lg text-gray-600 mb-6">Bienestar natural directo a su hogar. Sabor y salud en cada botella.</p>
                <div class="mb-8 text-4xl font-bold text-teal-700">$500.00 MXN</div>
                <div class="bg-teal-50 p-4 rounded-md border border-teal-100 mb-6">
                    <label class="block text-sm font-bold text-teal-800 mb-2">Cantidad de botellas:</label>
                    <input type="number" id="cantidad" value="1" min="1" class="w-full p-3 text-xl border-2 border-teal-200 rounded-md text-center font-bold outline-none">
                </div>
                <button onclick="irAPagar()" class="w-full bg-teal-700 text-white font-bold py-5 rounded-md hover:bg-teal-800 transition shadow-lg text-lg uppercase tracking-wider">Hacer mi pedido ahora</button>
            </div>
        </div>
    </main>

    <script>
        function irAPagar() {
            const cant = document.getElementById('cantidad').value;
            window.location.href = `checkout.html?cant=${cant}`;
        }
    </script>
</body>
</html>
