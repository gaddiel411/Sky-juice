<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Juice | Obregón</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Montserrat', sans-serif; background-color: #f7f7f7; }
  button:active { transform: scale(0.95); transition: 0.1s; }
  .agotado-img { filter: grayscale(1); opacity: 0.5; }
</style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-md mx-auto">
  <h1 class="text-3xl font-extrabold text-center mb-1 italic tracking-tighter text-slate-900">SKY JUICE</h1>
  <p class="text-center text-emerald-600 text-[10px] font-black uppercase tracking-widest mb-6">📍 Solo Ciudad Obregón</p>

  <div class="bg-white rounded-[2.5rem] p-6 shadow-xl border border-gray-100 mb-6 text-center">
    
    <div id="status-stock" class="mb-4 inline-block px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest bg-gray-100 text-gray-400">
      Sincronizando inventario...
    </div>

    <img id="foto-producto" src="producto.png" onerror="this.src='https://images.unsplash.com/photo-1622597467836-f3285f2131b7?auto=format&fit=crop&w=500&q=80'" 
         class="w-full h-64 object-cover rounded-[2rem] mb-6 shadow-inner transition-all duration-500">
    
    <div id="controles-venta" class="hidden">
        <p class="text-4xl font-black text-slate-900 mb-8 tracking-tight">$50 <span class="text-sm text-slate-400 uppercase">mxn</span></p>

        <div class="flex items-center justify-center gap-6 mb-8">
          <button onclick="cambiarCant(-1)" class="w-14 h-14 text-2xl font-bold bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-center shadow-sm text-slate-600">−</button>
          <span id="cantidad-display" class="text-4xl font-black w-12 text-slate-800">1</span>
          <button onclick="cambiarCant(1)" class="w-14 h-14 text-2xl font-bold bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-center shadow-sm text-slate-600">+</button>
        </div>

        <button onclick="irAPagar()" class="w-full bg-emerald-500 text-white text-lg font-black py-5 rounded-2xl shadow-lg shadow-emerald-100 uppercase tracking-widest hover:bg-emerald-600 transition-colors">
          ORDENAR AHORA
        </button>
    </div>

    <div id="mensaje-agotado" class="hidden py-10">
        <p class="text-2xl font-black text-slate-300 uppercase italic">Agotado por hoy</p>
        <p class="text-xs text-slate-400 mt-2 font-bold uppercase tracking-widest font-sans">Volveremos pronto con más frescura</p>
    </div>
  </div>
</div>

<script>
// TU LINK REAL PUBLICADO
const LINK_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSuwJooBcLa4w5CL9ZR2tWBwduiJGsXiPMUkIauf7oaqOCSOws5cNnfUJQKOhQapoR1lM1VEAh6VrkV/pub?gid=506146758&single=true&output=csv";

let stockReal = 0;
let cantSeleccionada = 1;

async function cargarStock() {
    try {
        const res = await fetch(LINK_CSV);
        const data = await res.text();
        const filas = data.split('\n');
        
        // El CSV viene como "STOCK INICIAL,20,20"
        // El stock real (B1 - Ventas) está en la tercera posición (índice 2)
        const columnas = filas[0].split(',');
        stockReal = parseInt(columnas[2]);

        dibujarUI();
    } catch (e) {
        document.getElementById("status-stock").innerText = "⚠️ Error de conexión";
        console.error("No se pudo leer el CSV:", e);
    }
}

function dibujarUI() {
    const etiq = document.getElementById("status-stock");
    const controles = document.getElementById("controles-venta");
    const agotado = document.getElementById("mensaje-agotado");
    const foto = document.getElementById("foto-producto");

    if (isNaN(stockReal) || stockReal <= 0) {
        etiq.innerText = "❌ AGOTADO";
        etiq.className = "mb-4 inline-block px-4 py-1 rounded-full text-[10px] font-black bg-red-50 text-red-500";
        controles.classList.add("hidden");
        agotado.classList.remove("hidden");
        foto.classList.add("agotado-img");
    } else {
        etiq.innerText = `✅ ${stockReal} DISPONIBLES`;
        etiq.className = "mb-4 inline-block px-4 py-1 rounded-full text-[10px] font-black bg-emerald-50 text-emerald-500 tracking-widest";
        controles.classList.remove("hidden");
        agotado.classList.add("hidden");
        foto.classList.remove("agotado-img");
    }
}

function cambiarCant(v) {
    cantSeleccionada += v;
    if (cantSeleccionada < 1) cantSeleccionada = 1;
    if (cantSeleccionada > stockReal) {
        cantSeleccionada = stockReal;
        alert("¡Híjole! Solo nos quedan " + stockReal + " piezas.");
    }
    document.getElementById("cantidad-display").innerText = cantSeleccionada;
}

function irAPagar() {
    // Te manda a checkout.html enviando la cantidad
    window.location.href = "checkout.html?cant=" + cantSeleccionada;
}

// Iniciar proceso
cargarStock();
</script>
</body>
</html>
