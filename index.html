<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Juice | Jugos Naturales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sold-out { filter: grayscale(1); opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-teal-600 text-white p-6 text-center shadow-lg">
        <h1 class="text-4xl font-black italic tracking-tighter">SKY JUICE</h1>
        <p class="text-xs uppercase tracking-widest font-bold mt-1">Obregón, Sonora</p>
    </header>

    <main class="max-w-md mx-auto p-4 pb-24">
        
        <div id="stock-banner" class="bg-white p-4 rounded-2xl shadow-sm border-2 mb-6 text-center">
            <span class="text-xs font-black text-slate-400 uppercase block mb-1">Disponibilidad Actual</span>
            <div class="flex items-center justify-center gap-2">
                <span id="txt-stock" class="text-3xl font-black text-slate-800">Cargando...</span>
                <span class="text-teal-600 font-bold text-sm">botellas</span>
            </div>
        </div>

        <div id="card-producto" class="bg-white rounded-3xl overflow-hidden shadow-xl border border-slate-200 mb-8">
            <img src="producto.png" alt="Jugo Sky Juice" class="w-full h-64 object-cover">
            <div class="p-6">
                <div class="flex justify-between items-start mb-2">
                    <h2 class="text-2xl font-black text-slate-800 uppercase">Jugo Natural</h2>
                    <span class="bg-teal-100 text-teal-700 px-3 py-1 rounded-full font-black text-lg">$50</span>
                </div>
                <p class="text-slate-500 text-sm mb-6">Prensado en frío, 100% fruta natural sin conservadores. ¡Pide el tuyo antes de que se acaben!</p>
                
                <form id="form-pedido" action="https://docs.google.com/forms/d/e/1FAIpQLSfpQ04sAcRnnwcRva1WYrXQ_0YXTZgR_TatbApG4MAyMvQAiw/formResponse" method="POST" class="space-y-4">
                    
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Tu Nombre</label>
                        <input type="text" name="entry.2005620554" placeholder="Ej. Juan Pérez" required 
                               class="w-full p-4 bg-slate-100 rounded-2xl border-2 border-transparent focus:border-teal-500 outline-none font-bold transition-all">
                    </div>

                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">WhatsApp</label>
                        <input type="tel" name="entry.1045701091" placeholder="644 123 4567" required 
                               class="w-full p-4 bg-slate-100 rounded-2xl border-2 border-transparent focus:border-teal-500 outline-none font-bold transition-all">
                    </div>

                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2">¿Cuántos quieres?</label>
                        <select name="entry.839337160" id="cantidad-select" class="w-full p-4 bg-slate-100 rounded-2xl border-2 border-transparent focus:border-teal-500 outline-none font-bold appearance-none">
                            <option value="1 Jugo">1 Jugo ($50)</option>
                            <option value="2 Jugos">2 Jugos ($100)</option>
                            <option value="3 Jugos">3 Jugos ($150)</option>
                        </select>
                    </div>

                    <button type="submit" id="btn-comprar" 
                            class="w-full bg-teal-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-teal-200 hover:bg-teal-700 active:scale-95 transition-all">
                        HACER PEDIDO
                    </button>
                    <p id="msg-agotado" class="text-red-500 font-black text-center hidden uppercase text-sm">Lo sentimos, por hoy se han agotado los jugos.</p>
                </form>
            </div>
        </div>

    </main>

    <script>
        // LEER EL STOCK DEL STORAGE (Sincronizado con Admin)
        function actualizarInterfaz() {
            let stockActual = localStorage.getItem('skyJuiceStock') ? parseInt(localStorage.getItem('skyJuiceStock')) : 0;
            
            const txtStock = document.getElementById('txt-stock');
            const btnComprar = document.getElementById('btn-comprar');
            const msgAgotado = document.getElementById('msg-agotado');
            const card = document.getElementById('card-producto');
            const banner = document.getElementById('stock-banner');

            txtStock.innerText = stockActual;

            if (stockActual <= 0) {
                txtStock.innerText = "AGOTADO";
                txtStock.classList.add('text-red-600');
                btnComprar.disabled = true;
                btnComprar.classList.add('bg-slate-300', 'shadow-none', 'cursor-not-allowed');
                btnComprar.innerText = "NO DISPONIBLE";
                msgAgotado.classList.remove('hidden');
                card.classList.add('sold-out');
                banner.classList.add('border-red-200');
            } else {
                txtStock.classList.remove('text-red-600');
                btnComprar.disabled = false;
                btnComprar.classList.remove('bg-slate-300');
                btnComprar.classList.add('bg-teal-600');
                btnComprar.innerText = "HACER PEDIDO";
                msgAgotado.classList.add('hidden');
                card.classList.remove('sold-out');
                banner.classList.remove('border-red-200');
            }
        }

        // Ejecutar al cargar la página
        actualizarInterfaz();

        // Escuchar si el Admin cambia el stock en otra pestaña
        window.addEventListener('storage', (e) => {
            if (e.key === 'skyJuiceStock') {
                actualizarInterfaz();
            }
        });
    </script>
</body>
</html>
