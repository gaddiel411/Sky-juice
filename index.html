<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Juice | Jugo de Caña Natural</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            touch-action: manipulation; 
            overflow-x: hidden;
        }

        button { touch-action: manipulation; }

        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="max-w-md mx-auto min-h-screen flex flex-col p-5 sm:p-6">
        <header class="text-center py-8">
            <h1 class="text-5xl font-[900] italic tracking-tighter uppercase text-slate-800">SKY <span class="text-emerald-500">JUICE</span></h1>
            <p class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400">Natural & Fresh • Obregón</p>
        </header>

        <div class="bg-white rounded-[3rem] shadow-2xl shadow-emerald-100/50 overflow-hidden border border-slate-100">
            <div class="p-2">
                <img src="https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?q=80&w=1000&auto=format&fit=crop" class="w-full h-72 sm:h-80 object-cover rounded-[2.5rem]">
            </div>
            
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="text-3xl font-[900] uppercase text-slate-800 italic leading-none">Jugo de Caña</h2>
                        <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-1">Botella Fresh 500ml</p>
                    </div>
                    <span class="text-3xl font-[900] text-emerald-500">$40</span>
                </div>

                <div id="status-badge" class="inline-flex items-center gap-2 bg-emerald-50 px-5 py-2 rounded-full mb-8 border border-emerald-100">
                    <span id="ping" class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    <span class="text-[10px] font-black uppercase tracking-widest text-emerald-700">
                        ¡Quedan <span id="stock-num" class="text-base">--</span> disponibles!
                    </span>
                </div>

                <div class="flex items-center justify-between bg-slate-50 p-4 sm:p-5 rounded-[2.5rem] mb-8 border-2 border-slate-100 w-full box-border">
                    <span class="text-[10px] font-black uppercase text-slate-400 tracking-tighter">¿CUÁNTOS?</span>
                    
                    <div class="flex items-center justify-end gap-3 sm:gap-6 flex-1 text-right">
                        <button onclick="cambiarCantCliente(-1)" class="w-10 h-10 flex items-center justify-center font-black text-2xl text-slate-300 hover:text-emerald-500 active:scale-90 transition-all">-</button>
                        
                        <input type="number" id="cant-cliente" value="1" readonly class="w-8 bg-transparent text-center font-[900] text-3xl text-slate-800 outline-none">
                        
                        <button onclick="cambiarCantCliente(1)" class="w-10 h-10 flex items-center justify-center font-black text-2xl text-slate-300 hover:text-emerald-500 active:scale-90 transition-all mr-1">+</button>
                    </div>
                </div>

                <button onclick="irAlPago()" id="btn-comprar" class="w-full bg-slate-900 text-white font-[900] py-6 rounded-[2.5rem] shadow-2xl hover:bg-black transition-all active:scale-95 uppercase tracking-[0.2em] text-lg disabled:bg-slate-200 disabled:text-slate-400">
                    ORDENAR AHORA
                </button>
            </div>
        </div>

        <footer class="mt-auto py-10 text-center">
            <p class="text-[10px] font-black uppercase tracking-[0.5em] text-slate-300 italic">© 2026 Sky Juice Obregón</p>
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCqb6MTA5HwLbMtpqyyn50oZQduJKvRIu4",
            authDomain: "skyjuice-25d01.firebaseapp.com",
            databaseURL: "https://skyjuice-25d01-default-rtdb.firebaseio.com",
            projectId: "skyjuice-25d01",
            storageBucket: "skyjuice-25d01.firebasestorage.app",
            messagingSenderId: "698344960386",
            appId: "1:698344960386:web:17d40a2eed4393ad311f9b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let stockGlobal = 0;

        db.ref('stock_actual').on('value', (snapshot) => {
            stockGlobal = snapshot.val() || 0;
            const display = document.getElementById('stock-num');
            const btn = document.getElementById('btn-comprar');
            const inputCant = document.getElementById('cant-cliente');
            const badge = document.getElementById('status-badge');

            display.innerText = stockGlobal;

            if (stockGlobal <= 0) {
                btn.innerText = "AGOTADO";
                btn.disabled = true;
                inputCant.value = 0;
                badge.classList.replace('bg-emerald-50', 'bg-red-50');
                badge.classList.replace('border-emerald-100', 'border-red-100');
                badge.querySelector('span:last-child').classList.replace('text-emerald-700', 'text-red-700');
                document.getElementById('ping').style.display = 'none';
            } else {
                btn.innerText = "ORDENAR AHORA";
                btn.disabled = false;
                badge.classList.replace('bg-red-50', 'bg-emerald-50');
                badge.classList.replace('border-red-100', 'border-emerald-100');
                badge.querySelector('span:last-child').classList.replace('text-red-700', 'text-emerald-700');
                document.getElementById('ping').style.display = 'flex';
                if(parseInt(inputCant.value) === 0) inputCant.value = 1;
            }
        });

        function cambiarCantCliente(n) {
            const input = document.getElementById('cant-cliente');
            let nuevaCant = parseInt(input.value) + n;
            if (nuevaCant >= 1 && nuevaCant <= stockGlobal) {
                input.value = nuevaCant;
            }
        }

        function irAlPago() {
            const valor = document.getElementById('cant-cliente').value;
            window.location.href = `checkout.html?cantidad=${valor}`;
        }
    </script>
</body>
</html>
