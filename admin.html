<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Admin | En Vivo</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#0d9488">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #panel-ventas { display: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">

    <div id="login-box" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full border-t-[10px] border-teal-600 text-center">
            <h2 class="text-3xl font-[900] mb-8 uppercase italic">Sky Admin</h2>
            <input type="password" id="passInput" placeholder="CONTRASEÑA" class="w-full p-5 border-2 rounded-2xl mb-6 text-center font-black text-2xl outline-none focus:border-teal-500 bg-slate-50">
            <button onclick="verificar()" class="w-full bg-teal-600 text-white py-5 rounded-2xl font-[900] uppercase tracking-widest shadow-lg">ENTRAR</button>
        </div>
    </div>

    <div id="panel-ventas" class="p-4 md:p-8 max-w-6xl mx-auto">
        <h1 class="text-4xl font-[900] text-slate-800 italic uppercase mb-8">SKY JUICE <span class="text-teal-600">EN VIVO 🔴</span></h1>

        <div class="bg-white p-6 rounded-[3rem] shadow-xl border mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-slate-50 p-4 rounded-3xl border text-center">
                    <label class="text-[10px] font-black uppercase mb-2 block">Fijar</label>
                    <div class="flex gap-2">
                        <input type="number" id="input-set" class="w-full p-2 text-center font-black text-xl border rounded-xl">
                        <button onclick="gestionarStock('set')" class="bg-blue-600 text-white px-4 rounded-xl font-black text-xs uppercase italic">Fijar</button>
                    </div>
                </div>
                <div class="bg-green-50 p-4 rounded-3xl border text-center">
                    <label class="text-[10px] font-black uppercase mb-2 block text-green-700">Sumar</label>
                    <div class="flex gap-2">
                        <input type="number" id="input-add" class="w-full p-2 text-center font-black text-xl border rounded-xl">
                        <button onclick="gestionarStock('add')" class="bg-green-600 text-white px-4 rounded-xl font-black text-xs uppercase italic">Add</button>
                    </div>
                </div>
                <div class="bg-red-50 p-4 rounded-3xl border text-center">
                    <label class="text-[10px] font-black uppercase mb-2 block text-red-700">Restar</label>
                    <div class="flex gap-2">
                        <input type="number" id="input-sub" class="w-full p-2 text-center font-black text-xl border rounded-xl">
                        <button onclick="gestionarStock('sub')" class="bg-red-600 text-white px-4 rounded-xl font-black text-xs uppercase italic">Sub</button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col items-center pt-4">
                <span id="stock-actual" class="text-[9rem] font-[900] text-slate-800 leading-none italic tracking-tighter">--</span>
                <p class="text-teal-600 font-black uppercase text-xs tracking-widest mt-2">Existencia Actual</p>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-[10px] text-slate-400 font-black uppercase border-b">
                    <tr><th class="p-6">Fecha</th><th class="p-6">Cliente</th><th class="p-6">WhatsApp</th><th class="p-6 text-center italic">Cant.</th></tr>
                </thead>
                <tbody id="contenido-tabla" class="divide-y font-bold italic"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCqb6MTA5HwLbMtpqyyn50oZQduJKvRIu4",
            authDomain: "skyjuice-25d01.firebaseapp.com",
            databaseURL: "https://skyjuice-25d01-default-rtdb.firebaseio.com",
            projectId: "skyjuice-25d01"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const stockRef = db.ref('stock_actual');

        function verificar() { if(document.getElementById('passInput').value === "123") { document.getElementById('login-box').style.display='none'; document.getElementById('panel-ventas').style.display='block'; solicitarPermisoNotif(); } }

        function gestionarStock(accion) {
            let id = (accion === 'set') ? 'input-set' : (accion === 'add') ? 'input-add' : 'input-sub';
            let val = parseInt(document.getElementById(id).value);
            if (isNaN(val)) return;
            if (accion === 'set') stockRef.set(val);
            else if (accion === 'add') stockRef.transaction(c => (c || 0) + val);
            else if (accion === 'sub') stockRef.transaction(c => Math.max(0, (c || 0) - val));
            document.getElementById(id).value = ""; 
        }

        stockRef.on('value', (s) => document.getElementById('stock-actual').innerText = s.val() || 0);

        // --- SISTEMA DE NOTIFICACIONES ---
        function solicitarPermisoNotif() {
            if (Notification.permission !== "granted") {
                Notification.requestPermission();
            }
        }

        let cargadoInicial = false;
        db.ref('pedidos').limitToLast(1).on('value', (snapshot) => {
            if (!cargadoInicial) { 
                cargadoInicial = true; 
                return; 
            }
            
            const datos = snapshot.val();
            if (datos) {
                const pedido = Object.values(datos)[0];
                // Sonar y Notificar
                if (Notification.permission === "granted") {
                    new Notification("🥤 ¡NUEVO PEDIDO!", {
                        body: `${pedido.nombre} pidió ${pedido.cantidad} jugos.`,
                        icon: "https://cdn-icons-png.flaticon.com/512/3105/3105807.png"
                    });
                    const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2861/2861-preview.mp3');
                    audio.play();
                }
            }
        });

        // Dibujar tabla completa
        db.ref('pedidos').on('value', (snapshot) => {
            const datos = snapshot.val();
            let html = "";
            if (datos) {
                Object.values(datos).reverse().forEach(p => {
                    html += `<tr class="border-b">
                        <td class="p-6 text-[10px] text-slate-400 font-mono">${p.fecha}</td>
                        <td class="p-6 font-black uppercase text-lg">${p.nombre}</td>
                        <td class="p-6"><a href="https://wa.me/${p.whatsapp.replace(/\D/g,'')}" target="_blank" class="text-teal-600 font-black underline italic">WhatsApp</a></td>
                        <td class="p-6 text-center font-black text-5xl text-emerald-600">${p.cantidad}</td>
                    </tr>`;
                });
            }
            document.getElementById('contenido-tabla').innerHTML = html;
        });

        // Esto ayuda a que el celular lo detecte como App
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGZ1bmN0aW9uKGV2ZW50KSB7fSk7');
        }
    </script>
</body>
</html>
