<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Master Admin | Sonido Activo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #panel-ventas { display: none; }
        .status-pendiente { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
        .status-pagado { background: #dcfce7; color: #16a34a; border: 1px solid #86efac; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="login-box" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-xs border-t-8 border-teal-600 text-center">
            <h2 class="text-2xl font-black mb-6 uppercase italic">Sky Admin</h2>
            <input type="password" id="passInput" placeholder="PASS" class="w-full h-14 p-4 border-2 rounded-xl mb-4 text-center font-black text-xl outline-none focus:border-teal-500 bg-slate-50">
            <button onclick="verificar()" class="w-full bg-teal-600 text-white py-4 rounded-xl font-black uppercase shadow-lg">ENTRAR</button>
        </div>
    </div>

    <div id="panel-ventas" class="p-4 lg:p-10 max-w-[1600px] mx-auto">
        
        <div class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl lg:text-5xl font-[900] text-slate-800 italic uppercase leading-none">SKY JUICE <span class="text-teal-600">MASTER</span></h1>
            
            <div class="flex flex-wrap gap-2 w-full lg:w-auto">
                <button id="btn-audio" onclick="permitirAudio()" class="flex-1 lg:flex-none bg-orange-500 text-white px-6 py-3 rounded-2xl font-black uppercase text-xs shadow-lg animate-pulse">🔊 Activar Sonido</button>
                <button onclick="exportarExcel()" class="flex-1 lg:flex-none bg-emerald-600 text-white px-6 py-3 rounded-2xl font-black uppercase text-xs shadow-lg">📊 Excel</button>
                <button onclick="limpiarPedidos()" class="flex-1 lg:flex-none bg-slate-800 text-white px-6 py-3 rounded-2xl font-black uppercase text-xs shadow-lg text-white">🧹 Limpiar</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border">
                    <div class="grid grid-cols-3 gap-2 mb-8">
                        <div class="bg-slate-50 p-2 rounded-2xl border text-center">
                            <label class="text-[9px] font-black mb-1 block">FIJAR</label>
                            <input type="number" id="input-set" class="w-full h-10 text-center font-bold border rounded-lg mb-2 text-sm outline-none">
                            <button onclick="gestionarStock('set')" class="w-full bg-blue-600 text-white py-2 rounded-lg text-[9px] font-black italic">SET</button>
                        </div>
                        <div class="bg-green-50 p-2 rounded-2xl border text-center">
                            <label class="text-[9px] font-black mb-1 block">SUMA</label>
                            <input type="number" id="input-add" class="w-full h-10 text-center font-bold border rounded-lg mb-2 text-sm outline-none">
                            <button onclick="gestionarStock('add')" class="w-full bg-green-600 text-white py-2 rounded-lg text-[9px] font-black italic">ADD</button>
                        </div>
                        <div class="bg-red-50 p-2 rounded-2xl border text-center">
                            <label class="text-[9px] font-black mb-1 block">RESTA</label>
                            <input type="number" id="input-sub" class="w-full h-10 text-center font-bold border rounded-lg mb-2 text-sm outline-none">
                            <button onclick="gestionarStock('sub')" class="w-full bg-red-600 text-white py-2 rounded-lg text-[9px] font-black italic">SUB</button>
                        </div>
                    </div>
                    <div class="text-center border-t pt-6">
                        <span id="stock-actual" class="text-8xl lg:text-[10rem] font-[900] text-slate-800 leading-none italic tracking-tighter">--</span>
                        <p class="text-teal-600 font-black uppercase text-[10px] mt-4 tracking-widest text-center italic">Existencia Actual</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 bg-white rounded-[2.5rem] shadow-xl border overflow-hidden">
                <div class="overflow-x-auto">
                    <table id="tabla-pedidos" class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] text-slate-400 font-black uppercase border-b">
                            <tr>
                                <th class="p-6">Fecha</th>
                                <th class="p-6">Cliente</th>
                                <th class="p-6">WhatsApp</th>
                                <th class="p-6 text-center italic">Cant.</th>
                                <th class="p-6 text-center">Estatus</th>
                            </tr>
                        </thead>
                        <tbody id="contenido-tabla" class="divide-y font-bold italic text-sm lg:text-base text-slate-700"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCqb6MTA5HwLbMtpqyyn50oZQduJKvRIu4",
            authDomain: "skyjuice-25d01.firebaseapp.com",
            databaseURL: "https://skyjuice-25d01-default-rtdb.firebaseio.com",
            projectId: "skyjuice-25d01"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const stockRef = db.ref('stock_actual');
        const pedidosRef = db.ref('pedidos');

        let cargadoInicial = false;
        let audioHabilitado = false;
        const sonidoCaja = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

        function permitirAudio() {
            audioHabilitado = true;
            sonidoCaja.play(); // Suena una vez para confirmar
            sonidoCaja.pause();
            document.getElementById('btn-audio').classList.remove('animate-pulse', 'bg-orange-500');
            document.getElementById('btn-audio').classList.add('bg-slate-200', 'text-slate-400');
            document.getElementById('btn-audio').innerText = "🔊 AUDIO LISTO";
            alert("¡Sonido Activado! Ya escucharás la caja registradora en cada venta.");
        }

        function verificar() { if(document.getElementById('passInput').value === "123") { document.getElementById('login-box').style.display='none'; document.getElementById('panel-ventas').style.display='block'; if(Notification.permission !== "granted") Notification.requestPermission(); } }

        function gestionarStock(accion) {
            let id = (accion === 'set') ? 'input-set' : (accion === 'add') ? 'input-add' : 'input-sub';
            let val = parseInt(document.getElementById(id).value);
            if (isNaN(val)) return;
            if (accion === 'set') stockRef.set(val);
            else if (accion === 'add') stockRef.transaction(c => (c || 0) + val);
            else if (accion === 'sub') stockRef.transaction(c => Math.max(0, (c || 0) - val));
            document.getElementById(id).value = ""; 
        }

        function cambiarEstatus(id, estatusActual) {
            const nuevoEstatus = estatusActual === "PAGADO" ? "PENDIENTE" : "PAGADO";
            pedidosRef.child(id).update({ pago: nuevoEstatus });
        }

        function limpiarPedidos() { if(confirm("¿Borrar todo el historial?")) pedidosRef.remove(); }

        function exportarExcel() {
            const table = document.getElementById("tabla-pedidos");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, "SkyJuice_Ventas.xlsx");
        }

        stockRef.on('value', (s) => document.getElementById('stock-actual').innerText = s.val() || 0);

        pedidosRef.on('value', (snapshot) => {
            const datos = snapshot.val();
            let html = "";
            
            if (datos) {
                const lista = Object.entries(datos).reverse();
                
                // DISPARAR ALERTAS SI ES PEDIDO NUEVO
                if (cargadoInicial) {
                    if (audioHabilitado) {
                        sonidoCaja.currentTime = 0;
                        sonidoCaja.play().catch(e => console.log("Falta clic inicial"));
                    }
                    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                    
                    if (Notification.permission === "granted") {
                        const ultimo = lista[0][1];
                        new Notification("🥤 ¡NUEVO PEDIDO!", { 
                            body: `${ultimo.nombre} pidió ${ultimo.cantidad} jugos.`,
                            icon: "https://cdn-icons-png.flaticon.com/512/3105/3105807.png" 
                        });
                    }
                }

                lista.forEach(([id, p]) => {
                    const est = p.pago || "PENDIENTE";
                    const btnClass = est === "PAGADO" ? "status-pagado" : "status-pendiente";
                    const telLimpio = p.whatsapp.replace(/\D/g,'');

                    html += `<tr class="border-b">
                        <td class="p-6 text-[10px] text-slate-400 font-mono">${p.fecha}</td>
                        <td class="p-6 uppercase font-black text-slate-800">${p.nombre}</td>
                        <td class="p-6">
                            <a href="https://wa.me/${telLimpio}" target="_blank" class="text-teal-600 underline text-xs">📱 ${p.whatsapp}</a>
                        </td>
                        <td class="p-6 text-center font-black text-4xl text-emerald-600">${p.cantidad}</td>
                        <td class="p-6 text-center">
                            <button onclick="cambiarEstatus('${id}', '${est}')" class="px-4 py-2 rounded-full text-[10px] font-[900] uppercase ${btnClass}">
                                ${est === "PAGADO" ? "✅ PAGADO" : "❌ PENDIENTE"}
                            </button>
                        </td>
                    </tr>`;
                });
            } else {
                html = '<tr><td colspan="5" class="p-20 text-center font-bold text-slate-300 italic uppercase">Esperando ventas... 🥤</td></tr>';
            }
            document.getElementById('contenido-tabla').innerHTML = html;
            cargadoInicial = true;
        });
    </script>
</body>
</html>
