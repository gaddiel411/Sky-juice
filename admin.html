<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Juice Admin | Obregón</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="login-box" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] shadow-xl max-w-sm w-full text-center border border-slate-100">
            <h2 class="text-2xl font-black mb-6 italic tracking-tighter">SKY <span class="text-emerald-500">ADMIN</span></h2>
            <input type="password" id="passInput" placeholder="Contraseña" class="w-full p-4 border rounded-2xl mb-4 text-center font-bold bg-slate-50 outline-none focus:border-emerald-500">
            <button onclick="verificar()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-emerald-600 transition-all">ENTRAR</button>
        </div>
    </div>

    <div id="panel-ventas" class="hidden p-4 md:p-8 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black italic tracking-tighter uppercase">Sky Juice <span class="text-emerald-500">Admin</span></h1>
            <button onclick="cargarTodo()" class="bg-white border p-3 rounded-xl shadow-sm hover:bg-slate-100 flex items-center gap-2 font-bold text-xs">
                🔄 ACTUALIZAR
            </button>
        </div>

        <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 mb-8 text-center relative overflow-hidden">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Inventario Actual (C1 en Excel)</p>
            <div id="stock-actual" class="text-9xl font-black text-slate-800 tracking-tighter">--</div>
            <p class="text-emerald-500 font-black uppercase text-[10px] mt-2 tracking-widest">Botellas Disponibles</p>
            
            <div class="mt-8">
                <a href="https://docs.google.com/spreadsheets/d/1vSuwJooBcLa4w5CL9ZR2tWBwduiJGsXiPMUkIauf7oaqOCSOws5cNnfUJQKOhQapoR1lM1VEAh6VrkV/edit" 
                   target="_blank" 
                   class="inline-flex items-center gap-2 bg-slate-100 text-slate-600 px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-slate-200 transition-all">
                    ✏️ Editar Stock Inicial (B1)
                </a>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b bg-slate-50/50 flex justify-between items-center">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Registro de Ventas</span>
                <button onclick="exportarExcel()" class="text-[9px] bg-slate-900 text-white px-4 py-2 rounded-full font-black uppercase tracking-widest hover:bg-black">Descargar Reporte</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white text-[9px] text-slate-300 uppercase font-black tracking-widest border-b">
                        <tr>
                            <th class="p-6">Fecha</th>
                            <th class="p-6">Cliente</th>
                            <th class="p-6 text-center">WhatsApp</th>
                            <th class="p-6 text-center">Cant.</th>
                        </tr>
                    </thead>
                    <tbody id="contenido-tabla" class="text-xs font-bold divide-y divide-slate-50">
                        <tr><td colspan="4" class="p-10 text-center italic text-slate-300 uppercase tracking-widest text-[10px]">Cargando pedidos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // LINK DE EXPORTACIÓN (Para leer C1 de Hoja 1)
        const URL_STOCK = "https://docs.google.com/spreadsheets/d/1vSuwJooBcLa4w5CL9ZR2tWBwduiJGsXiPMUkIauf7oaqOCSOws5cNnfUJQKOhQapoR1lM1VEAh6VrkV/export?format=csv&gid=506146758";
        
        // LINK DE RESPUESTAS (Para la tabla de pedidos)
        const URL_PEDIDOS = "https://docs.google.com/spreadsheets/d/1vSuwJooBcLa4w5CL9ZR2tWBwduiJGsXiPMUkIauf7oaqOCSOws5cNnfUJQKOhQapoR1lM1VEAh6VrkV/export?format=csv&gid=1510344589";

        function verificar() {
            if(document.getElementById('passInput').value === "123") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('panel-ventas').classList.remove('hidden');
                cargarTodo();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        async function cargarTodo() {
            cargarStock();
            cargarPedidos();
        }

        async function cargarStock() {
            try {
                const res = await fetch(URL_STOCK + "&t=" + new Date().getTime());
                const data = await res.text();
                const columnas = data.split(/\r?\n/)[0].split(',');
                // Celda C1 (índice 2)
                const valor = columnas[2].replace(/"/g, '');
                document.getElementById('stock-actual').innerText = valor;
            } catch (e) { console.error("Error stock:", e); }
        }

        async function cargarPedidos() {
            try {
                const res = await fetch(URL_PEDIDOS + "&t=" + new Date().getTime());
                const data = await res.text();
                const filas = data.split(/\r?\n/).filter(line => line.trim() !== "").slice(1);
                let html = "";

                filas.reverse().forEach(fila => { // Los más nuevos arriba
                    const c = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length >= 3) {
                        const fecha = c[0].replace(/"/g, '').split(' ')[0];
                        const nombre = c[1] ? c[1].replace(/"/g, '') : "---";
                        const tel = c[2] ? c[2].replace(/"/g, '').replace(/\D/g,'') : "";
                        const cant = c[4] ? c[4].replace(/"/g, '') : "1";

                        html += `<tr class="hover:bg-slate-50 transition-all">
                            <td class="p-6 text-slate-400 font-mono text-[10px]">${fecha}</td>
                            <td class="p-6 uppercase text-slate-700 font-black">${nombre}</td>
                            <td class="p-6 text-center">
                                <a href="https://wa.me/52${tel}" target="_blank" class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-lg text-[9px] font-black uppercase tracking-tighter hover:bg-emerald-500 hover:text-white transition-all">
                                    Enviar WhatsApp
                                </a>
                            </td>
                            <td class="p-6 text-center font-black text-lg text-emerald-500">${cant}</td>
                        </tr>`;
                    }
                });
                document.getElementById('contenido-tabla').innerHTML = html || '<tr><td colspan="4" class="p-10 text-center text-slate-300 font-bold uppercase text-[10px]">Sin ventas hoy</td></tr>';
            } catch (e) { console.error("Error pedidos:", e); }
        }

        function exportarExcel() {
            const lib = XLSX.utils.table_to_book(document.querySelector("table"));
            XLSX.writeFile(lib, "Reporte_Ventas_SkyJuice.xlsx");
        }
    </script>
</body>
</html>
