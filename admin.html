<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Juice | Financial Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #panel-ventas { display: none; }
        .status-pendiente { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
        .status-pagado { background: #dcfce7; color: #16a34a; border: 1px solid #86efac; }
        
        .stat-capsule {
            border-radius: 3rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            min-height: 140px;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">

    <div id="login-box" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-xs border-t-8 border-teal-600 text-center">
            <h2 class="text-2xl font-black mb-6 uppercase italic text-slate-400 leading-none">Sky <span class="text-slate-900">Admin</span></h2>
            <input type="password" id="passInput" placeholder="CONTRASEÑA" class="w-full h-14 p-4 border-2 rounded-xl mb-4 text-center font-black text-xl outline-none focus:border-teal-500 bg-slate-50">
            <button onclick="verificar()" class="w-full bg-teal-600 text-white py-4 rounded-xl font-black uppercase shadow-lg">Entrar</button>
        </div>
    </div>

    <div id="panel-ventas" class="p-4 lg:p-10 max-w-[1600px] mx-auto pb-32">
        
        <div class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl lg:text-5xl font-[900] text-slate-800 italic uppercase">SKY JUICE <span class="text-teal-600">FINANCE</span></h1>
            <div class="flex gap-2 w-full lg:w-auto">
                <button id="btn-audio" onclick="permitirAudio()" class="flex-1 lg:flex-none bg-orange-500 text-white px-6 py-3 rounded-2xl font-black uppercase text-[10px] shadow-lg animate-pulse">🔊 Activar Avisos</button>
                <button onclick="exportarExcel()" class="flex-1 lg:flex-none bg-emerald-600 text-white px-6 py-3 rounded-2xl font-black uppercase text-[10px]">📊 Excel</button>
                <button onclick="limpiarPedidos()" class="flex-1 lg:flex-none bg-slate-800 text-white px-6 py-3 rounded-2xl font-black uppercase text-[10px]">🧹 Limpiar</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-12">
            <div class="lg:col-span-3">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border sticky top-10">
                    <div class="grid grid-cols-3 gap-2 mb-6">
                        <div class="flex flex-col gap-1">
                            <input type="number" id="input-set" class="w-full h-8 text-center font-bold border rounded-lg text-xs outline-none" placeholder="0">
                            <button onclick="gestionarStock('set')" class="w-full bg-blue-600 text-white py-1.5 rounded-lg text-[8px] font-black uppercase">Set</button>
                        </div>
                        <div class="flex flex-col gap-1">
                            <input type="number" id="input-add" class="w-full h-8 text-center font-bold border rounded-lg text-xs outline-none" placeholder="+">
                            <button onclick="gestionarStock('add')" class="w-full bg-green-600 text-white py-1.5 rounded-lg text-[8px] font-black uppercase">Add</button>
                        </div>
                        <div class="flex flex-col gap-1">
                            <input type="number" id="input-sub" class="w-full h-8 text-center font-bold border rounded-lg text-xs outline-none" placeholder="-">
                            <button onclick="gestionarStock('sub')" class="w-full bg-red-600 text-white py-1.5 rounded-lg text-[8px] font-black uppercase">Sub</button>
                        </div>
                    </div>
                    <div class="text-center">
                        <span id="stock-actual" class="text-8xl font-[900] text-slate-800 leading-none italic tracking-tighter">--</span>
                        <p class="text-teal-600 font-black uppercase text-[10px] mt-2 italic tracking-widest">En Nevera</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9 bg-white rounded-[2.5rem] shadow-xl border overflow-hidden">
                <table id="tabla-pedidos" class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] text-slate-400 font-black uppercase border-b">
                        <tr>
                            <th class="p-6">Fecha</th>
                            <th class="p-6">Cliente</th>
                            <th class="p-6">WhatsApp</th>
                            <th class="p-6 text-center italic">Cant.</th>
                            <th class="p-6 text-center italic">Pago</th>
                        </tr>
                    </thead>
                    <tbody id="contenido-tabla" class="divide-y font-bold italic text-sm lg:text-base"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[3rem] shadow-2xl border-t-4 border-teal-600">
            <h3 class="text-center text-slate-400 font-black uppercase text-xs mb-6 tracking-widest">Resumen Financiero</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <div class="stat-capsule bg-white border-2 border-red-50">
                    <span id="cant-deuda" class="text-7xl font-black text-red-500 italic leading-none">0</span>
                    <p class="text-[11px] font-black uppercase tracking-tighter text-slate-400 mt-2">Jugos en Deuda</p>
                </div>

                <div class="stat-capsule bg-white border-2 border-emerald-50">
                    <span id="cant-pagado" class="text-7xl font-black text-emerald-500 italic leading-none">0</span>
                    <p class="text-[11px] font-black uppercase tracking-tighter text-slate-400 mt-2">Jugos Pagados</p>
                </div>

                <div class="stat-capsule bg-slate-800 relative overflow-hidden">
                    <div class="flex items-center gap-1">
                        <span class="text-3xl font-black text-teal-400">$</span>
                        <span id="ganancia-total" class="text-7xl font-black text-white italic leading-none">0</span>
                        <button onclick="toggleReparto()" class="text-teal-400 hover:scale-110 transition-transform ml-2 text-2xl" title="Ver Reparto">📈</button>
                    </div>
                    <p class="text-[11px] font-black uppercase tracking-tighter text-teal-500/50 mt-2">Ganancia Total</p>
                    
                    <div id="box-reparto" class="hidden absolute inset-0 bg-slate-900/95 flex items-center justify-center p-4">
                        <div class="grid grid-cols-2 gap-8 text-center">
                            <div>
                                <p class="text-[10px] text-teal-500 font-black uppercase">Tu 30%</p>
                                <p id="mi-ganancia" class="text-3xl font-black text-white">$0</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-400 font-black uppercase">Resto (70%)</p>
                                <p id="el-resto" class="text-3xl font-black text-slate-300">$0</p>
                            </div>
                        </div>
                        <button onclick="toggleReparto()" class="absolute top-2 right-4 text-white font-bold">✕</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCqb6MTA5HwLbMtpqyyn50oZQduJKvRIu4",
            authDomain: "skyjuice-25d01.firebaseapp.com",
            databaseURL: "https://skyjuice-25d01-default-rtdb.firebaseio.com",
            projectId: "skyjuice-25d01"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const stockRef = db.ref('stock_actual');
        const pedidosRef = db.ref('pedidos');

        let cargadoInicial = false;
        let audioHabilitado = false;
        const sonidoCaja = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

        function permitirAudio() {
            audioHabilitado = true;
            sonidoCaja.play();
            document.getElementById('btn-audio').classList.remove('animate-pulse', 'bg-orange-500');
            document.getElementById('btn-audio').classList.add('bg-slate-200', 'text-slate-400');
            document.getElementById('btn-audio').innerText = "🔊 AUDIO LISTO";
        }

        function toggleReparto() {
            document.getElementById('box-reparto').classList.toggle('hidden');
        }

        function verificar() { if(document.getElementById('passInput').value === "123") { document.getElementById('login-box').style.display='none'; document.getElementById('panel-ventas').style.display='block'; if(Notification.permission !== "granted") Notification.requestPermission(); } }

        function gestionarStock(accion) {
            let id = (accion === 'set') ? 'input-set' : (accion === 'add') ? 'input-add' : 'input-sub';
            let val = parseInt(document.getElementById(id).value);
            if (isNaN(val)) return;
            if (accion === 'set') stockRef.set(val);
            else if (accion === 'add') stockRef.transaction(c => (c || 0) + val);
            else if (accion === 'sub') stockRef.transaction(c => Math.max(0, (c || 0) - val));
            document.getElementById(id).value = ""; 
        }

        function cambiarEstatus(id, estatusActual) {
            const nuevoEstatus = estatusActual === "PAGADO" ? "PENDIENTE" : "PAGADO";
            pedidosRef.child(id).update({ pago: nuevoEstatus });
        }

        function limpiarPedidos() {
            const confirmacion = confirm("⚠️ ATENCIÓN: Estás por eliminar todo el historial de pedidos y el corte financiero actual. Esta acción no se puede deshacer.\n\n¿Deseas proceder con el cierre de caja?");
            if(confirmacion) {
                pedidosRef.remove().then(() => {
                    alert("✅ Sistema reiniciado correctamente.");
                });
            }
        }

        function exportarExcel() {
            const table = document.getElementById("tabla-pedidos");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, "SkyJuice_Corte.xlsx");
        }

        stockRef.on('value', (s) => document.getElementById('stock-actual').innerText = s.val() || 0);

        pedidosRef.on('value', (snapshot) => {
            const datos = snapshot.val();
            let html = "";
            let totalDeuda = 0;
            let totalPagado = 0;
            
            if (datos) {
                const lista = Object.entries(datos).reverse();
                
                if (cargadoInicial) {
                    if (audioHabilitado) {
                        sonidoCaja.currentTime = 0;
                        sonidoCaja.play();
                    }
                    if (Notification.permission === "granted") {
                        const u = lista[0][1];
                        new Notification("🥤 ¡NUEVO PEDIDO!", { body: `${u.nombre} pidió ${u.cantidad} jugos.` });
                    }
                }

                lista.forEach(([id, p]) => {
                    const est = p.pago || "PENDIENTE";
                    const btnClass = est === "PAGADO" ? "status-pagado" : "status-pendiente";
                    const telLimpio = p.whatsapp.replace(/\D/g,'');
                    
                    if (est === "PAGADO") totalPagado += parseInt(p.cantidad);
                    else totalDeuda += parseInt(p.cantidad);

                    html += `<tr class="border-b">
                        <td class="p-6 text-[10px] text-slate-400 font-mono italic">${p.fecha}</td>
                        <td class="p-6 uppercase font-black text-slate-800">${p.nombre}</td>
                        <td class="p-6">
                            <a href="https://wa.me/${telLimpio}" target="_blank" class="text-teal-600 underline text-xs"> ${p.whatsapp}</a>
                        </td>
                        <td class="p-6 text-center font-black text-4xl text-emerald-600 italic">${p.cantidad}</td>
                        <td class="p-6 text-center">
                            <button onclick="cambiarEstatus('${id}', '${est}')" class="px-4 py-2 rounded-full text-[10px] font-black uppercase ${btnClass}">
                                ${est === "PAGADO" ? "✅ PAGADO" : "❌ PENDIENTE"}
                            </button>
                        </td>
                    </tr>`;
                });
            }

            // CAMBIO DE LÓGICA A 30% / 70%
            const gananciaTotal = totalPagado * 40;
            const miParte = gananciaTotal * 0.30; // Aquí está el 30%
            const resto = gananciaTotal - miParte;

            document.getElementById('cant-deuda').innerText = totalDeuda;
            document.getElementById('cant-pagado').innerText = totalPagado;
            document.getElementById('ganancia-total').innerText = gananciaTotal;
            document.getElementById('mi-ganancia').innerText = "$" + miParte.toFixed(0);
            document.getElementById('el-resto').innerText = "$" + resto.toFixed(0);
            
            document.getElementById('contenido-tabla').innerHTML = html || '<tr><td colspan="5" class="p-20 text-center font-black text-slate-300 uppercase italic tracking-widest">Esperando ventas...</td></tr>';
            cargadoInicial = true;
        });
    </script>
</body>
</html>
