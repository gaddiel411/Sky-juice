<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Juice Admin | Obregón</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="login-box" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] shadow-xl max-w-sm w-full text-center border border-slate-100">
            <h2 class="text-2xl font-black mb-6 italic tracking-tighter">SKY ADMIN</h2>
            <input type="password" id="passInput" placeholder="Contraseña" class="w-full p-4 border rounded-2xl mb-4 text-center font-bold bg-slate-50 outline-none focus:border-emerald-500">
            <button onclick="verificar()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-emerald-600 transition-all">ENTRAR</button>
        </div>
    </div>

    <div id="panel-ventas" class="hidden p-4 md:p-8 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black italic tracking-tighter">SKY JUICE <span class="text-emerald-500">ADMIN</span></h1>
            <button onclick="cargarTodo()" class="bg-white border p-3 rounded-xl shadow-sm hover:bg-slate-100">🔄 Actualizar Todo</button>
        </div>

        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 mb-6 text-center">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Inventario Actual (Fórmula Excel)</p>
            <div id="stock-actual" class="text-8xl font-black text-slate-800">--</div>
            <p class="text-emerald-500 font-black uppercase text-[10px] mt-2 tracking-widest">Botellas Disponibles</p>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pedidos Recientes</span>
                <button onclick="exportarExcel()" class="text-[10px] bg-slate-800 text-white px-3 py-1 rounded-lg font-bold">Descargar Excel</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white text-[10px] text-slate-400 uppercase font-black tracking-widest border-b">
                        <tr>
                            <th class="p-5">Fecha</th>
                            <th class="p-5">Cliente</th>
                            <th class="p-5">WhatsApp</th>
                            <th class="p-5">Entrega</th>
                            <th class="p-5 text-center">Cant.</th>
                        </tr>
                    </thead>
                    <tbody id="contenido-tabla" class="text-xs font-bold divide-y divide-slate-50">
                        <tr><td colspan="5" class="p-10 text-center italic text-slate-300">Cargando datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // LINK DE TU HOJA 1 (STOCK)
        const URL_STOCK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSuwJooBcLa4w5CL9ZR2tWBwduiJGsXiPMUkIauf7oaqOCSOws5cNnfUJQKOhQapoR1lM1VEAh6VrkV/pub?gid=506146758&single=true&output=csv";
        
        // LINK DE TU HOJA DE RESPUESTAS (PEDIDOS)
        const URL_PEDIDOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSuwJooBcLa4w5CL9ZR2tWBwduiJGsXiPMUkIauf7oaqOCSOws5cNnfUJQKOhQapoR1lM1VEAh6VrkV/pub?gid=1510344589&single=true&output=csv";

        function verificar() {
            if(document.getElementById('passInput').value === "123") {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('panel-ventas').classList.remove('hidden');
                cargarTodo();
            }
        }

        async function cargarTodo() {
            cargarStock();
            cargarPedidos();
        }

        async function cargarStock() {
            try {
                const res = await fetch(URL_STOCK + "&cache=" + new Date().getTime());
                const data = await res.text();
                const filas = data.split(/\r?\n/);
                const columnas = filas[0].split(',');
                // Leemos la celda C1 (índice 2)
                const stockVal = columnas[2].replace(/"/g, '');
                document.getElementById('stock-actual').innerText = stockVal;
            } catch (e) { console.error("Error stock:", e); }
        }

        async function cargarPedidos() {
            try {
                const res = await fetch(URL_PEDIDOS + "&cache=" + new Date().getTime());
                const data = await res.text();
                const filas = data.split(/\r?\n/).filter(line => line.trim() !== "").slice(1);
                let html = "";

                filas.forEach(fila => {
                    const c = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length >= 3) {
                        const fecha = c[0].replace(/"/g, '').split(' ')[0];
                        const nombre = c[1] ? c[1].replace(/"/g, '') : "---";
                        const tel = c[2] ? c[2].replace(/"/g, '') : "";
                        const entrega = c[3] ? c[3].replace(/"/g, '') : "Punto";
                        const cant = c[4] ? c[4].replace(/"/g, '') : "1";

                        html += `<tr class="hover:bg-slate-50 transition-colors">
                            <td class="p-5 text-slate-400 font-mono text-[10px]">${fecha}</td>
                            <td class="p-5 uppercase text-slate-800">${nombre}</td>
                            <td class="p-5"><a href="https://wa.me/52${tel.replace(/\D/g,'')}" target="_blank" class="text-emerald-500 font-black italic">📱 WHATSAPP</a></td>
                            <td class="p-5 text-slate-400 italic">${entrega}</td>
                            <td class="p-5 text-center font-black text-lg">${cant}</td>
                        </tr>`;
                    }
                });
                document.getElementById('contenido-tabla').innerHTML = html || '<tr><td colspan="5" class="p-10 text-center italic text-slate-300">No hay ventas registradas</td></tr>';
            } catch (e) { console.error("Error pedidos:", e); }
        }

        function exportarExcel() {
            const lib = XLSX.utils.table_to_book(document.querySelector("table"));
            XLSX.writeFile(lib, "Ventas_SkyJuice.xlsx");
        }
    </script>
</body>
</html>
