<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Reparto de Ganancias</title>
    <style>
        :root {
            --sidebar-bg: #1e293b;
            --main-bg: #f1f5f9;
            --accent: #3b82f6;
            --text-main: #334155;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--main-bg);
            color: var(--text-main);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h1 { font-size: 1.2rem; margin-bottom: 2rem; color: var(--accent); }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--accent); }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .card h3 { margin: 0; font-size: 0.9rem; color: #64748b; }
        .card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; }

        /* Calculation Table Area */
        .table-container {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #e2e8f0; color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        input {
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            width: 90%;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-add { background: #10b981; color: white; margin-top: 15px; }
        .btn-danger { background: #ef4444; color: white; padding: 5px 10px; }

        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            background: #dcfce7;
            color: #166534;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>Finanzas Admin</h1>
    <div class="nav-item active">📊 Dashboard</div>
    <div class="nav-item">👥 Socios</div>
    <div class="nav-item">📜 Historial</div>
    <div class="nav-item">⚙️ Configuración</div>
</div>

<div class="main-content">
    <div class="header">
        <h2>Panel de Reparto</h2>
        <div>
            <label>Monto Total: </label>
            <input type="number" id="globalAmount" value="10000" style="width: 150px; font-weight: bold; font-size: 1.1rem;">
            <button class="btn btn-primary" onclick="processPayment()">Ejecutar Reparto</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="card">
            <h3>Total a Distribuir</h3>
            <p id="statTotal">$10,000.00</p>
        </div>
        <div class="card">
            <h3>Suma Porcentajes</h3>
            <p id="statPercent">100%</p>
        </div>
        <div class="card">
            <h3>Estado</h3>
            <p><span class="status-badge" id="statStatus">Listo</span></p>
        </div>
    </div>

    <div class="table-container">
        <h3>Gestión de Beneficiarios</h3>
        <table id="partnersTable">
            <thead>
                <tr>
                    <th>Nombre del Socio</th>
                    <th>Porcentaje (%)</th>
                    <th>Monto Calculado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td><input type="text" value="Socio Fundador" class="p-name"></td>
                    <td><input type="number" value="60" class="p-percent" oninput="updateStats()"></td>
                    <td class="p-result">$6,000.00</td>
                    <td><button class="btn btn-danger" onclick="removeRow(this)">✕</button></td>
                </tr>
                <tr>
                    <td><input type="text" value="Inversionista Ángel" class="p-name"></td>
                    <td><input type="number" value="40" class="p-percent" oninput="updateStats()"></td>
                    <td class="p-result">$4,000.00</td>
                    <td><button class="btn btn-danger" onclick="removeRow(this)">✕</button></td>
                </tr>
            </tbody>
        </table>
        <button class="btn btn-add" onclick="addRow()">+ Añadir Beneficiario</button>
    </div>
</div>

<script>
    function updateStats() {
        const totalAmount = parseFloat(document.getElementById('globalAmount').value) || 0;
        const percents = document.querySelectorAll('.p-percent');
        const results = document.querySelectorAll('.p-result');
        
        let sumPercent = 0;
        
        percents.forEach((p, index) => {
            const val = parseFloat(p.value) || 0;
            sumPercent += val;
            const share = totalAmount * (val / 100);
            results[index].innerText = `$${share.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        });

        document.getElementById('statTotal').innerText = `$${totalAmount.toLocaleString()}`;
        document.getElementById('statPercent').innerText = `${sumPercent}%`;
        
        const badge = document.getElementById('statStatus');
        if(sumPercent === 100) {
            badge.innerText = "Listo";
            badge.style.background = "#dcfce7"; badge.style.color = "#166534";
        } else {
            badge.innerText = "Error %";
            badge.style.background = "#fee2e2"; badge.style.color = "#991b1b";
        }
    }

    function addRow() {
        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow();
        row.innerHTML = `
            <td><input type="text" placeholder="Nuevo Socio" class="p-name"></td>
            <td><input type="number" value="0" class="p-percent" oninput="updateStats()"></td>
            <td class="p-result">$0.00</td>
            <td><button class="btn btn-danger" onclick="removeRow(this)">✕</button></td>
        `;
        updateStats();
    }

    function removeRow(btn) {
        btn.closest('tr').remove();
        updateStats();
    }

    function processPayment() {
        const percent = parseFloat(document.getElementById('statPercent').innerText);
        if(percent !== 100) {
            alert("Error: El total de los porcentajes debe sumar exactamente 100%");
        } else {
            alert("¡Reparto procesado exitosamente en el sistema!");
        }
    }

    document.getElementById('globalAmount').addEventListener('input', updateStats);
</script>

</body>
</html>
