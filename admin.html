<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Juice Admin | Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50">
    <div class="max-w-md mx-auto p-6 text-center">
        <h1 class="text-3xl font-black italic mb-8 uppercase text-slate-800">Sky <span class="text-emerald-500">Admin</span></h1>

        <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Stock en Tiempo Real</p>
            <div id="stock-num" class="text-9xl font-black text-slate-800 mb-8">--</div>
            
            <div class="flex justify-center gap-4">
                <button onclick="cambiarStock(-1)" class="w-20 h-20 bg-slate-100 rounded-3xl text-3xl font-black hover:bg-red-50 hover:text-red-500 transition-all">-</button>
                <button onclick="cambiarStock(1)" class="w-20 h-20 bg-slate-100 rounded-3xl text-3xl font-black hover:bg-emerald-50 hover:text-emerald-500 transition-all">+</button>
            </div>
            
            <input type="number" id="set-valor" placeholder="20" class="mt-8 w-20 p-2 text-center border rounded-lg font-bold">
            <button onclick="fijarStock()" class="block w-full mt-2 text-[10px] font-black uppercase text-slate-400">Fijar Cantidad</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCqb6MTA5HwLbMtpqyyn50oZQduJKvRIu4",
            authDomain: "skyjuice-25d01.firebaseapp.com",
            databaseURL: "https://skyjuice-25d01-default-rtdb.firebaseio.com",
            projectId: "skyjuice-25d01",
            storageBucket: "skyjuice-25d01.firebasestorage.app",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const stockRef = db.ref('stock_actual');

        stockRef.on('value', (snap) => {
            document.getElementById('stock-num').innerText = snap.val() || 0;
        });

        function cambiarStock(n) {
            stockRef.transaction(c => (c || 0) + n);
        }

        function fijarStock() {
            const val = parseInt(document.getElementById('set-valor').value);
            if(!isNaN(val)) stockRef.set(val);
        }
    </script>
</body>
</html>
